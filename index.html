<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi A Duyên ❤️</title>
    <style>
        body {
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 1;
            max-width: 85%;
            position: relative;
        }

        .cat-gif {
            width: 220px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4d4d;
            font-size: 19px;
            line-height: 1.5;
            padding: 0 10px;
        }

        .btn-group {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 120px;
        }

        button {
            padding: 12px 18px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4d4d;
            color: white;
        }

        #noBtn {
            background-color: #808080;
            color: white;
            white-space: nowrap;
        }

        .footer-text {
            font-size: 11px;
            color: #999;
            margin-top: 20px;
            font-style: italic;
        }

        .heart {
            position: fixed;
            top: -10px;
            color: #ff4d4d;
            font-size: 20px;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <!-- Chú mèo "bit lỗi òi mah" -->
        <img src="https://raw.githubusercontent.com/blackmeow2410-png/yeu-thuong/main/cat-image.jpg" onerror="this.src='https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bm1oZ3R3eGZ3bm1oZ3R3eGZ3bm1oZ3R3eGZ3bm1oZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif'" class="cat-gif">
        
        <h1 id="question">A Duyên, em xin lỗi vì hôm qua đã vô lý với anh. Thiệt lòng đó. Em bị dựa. Ai nói trong đầu em ớ. Hôm nay em soạn lại văn rồi. Anh người lớn đừng chấp con nít nha. Bỏ qua cho em he ❤️</h1>

        <div class="btn-group" id="btnGroup">
            <button id="yesBtn" onclick="thankYou()">Anh đồng ý</button>
            <button id="noBtn" onclick="noClicked()">Hông nha</button>
        </div>
    </div>

    <script>
        let clickCount = 0;
        let isRunning = false;

        function noClicked() {
            clickCount++;
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');

            if (clickCount === 1) {
                noBtn.innerHTML = "đi màaaa";
                noBtn.style.transform = "scale(0.8)";
                yesBtn.style.transform = "scale(1.3)";
            } 
            else if (clickCount === 2) {
                noBtn.innerHTML = "Thui màaaa";
                noBtn.style.transform = "scale(0.6)";
                yesBtn.innerHTML = "Hoàn toàn đồng ý";
                yesBtn.style.transform = "scale(1.7)";
            } 
            else {
                if (!isRunning) {
                    isRunning = true;
                    noBtn.style.position = "fixed";
                    noBtn.innerHTML = "Năn nỉ đóooo";
                }
                moveButton();
            }
        }

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        document.getElementById('noBtn').onmouseover = () => {
            if (isRunning) moveButton();
        };

        function thankYou() {
            document.getElementById('mainBox').innerHTML = `
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eDF4N2t6bzh4cnh3NjV4NXB1cmx4NXB1cmx4NXB1cmx4NXB1cmx4ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif" class="cat-gif">
                <h1 style="color: #ff4d4d;">PHẢI VẬY CHỨ . Nói chứ chân thành xin lỗi lun ❤️<br><br>
                <span style="font-size: 16px; color: #666; font-weight: normal;">Để em coi lại tâm trạng đã. Chứ dạo này bị làm sao á. Anh tập trung cho công việc đi nè. Đợi có tiền, em mời anh ăn mừng ha <br> Đừng để bụng nhaaa</span></h1>
                <div class="footer-text">Cần phụ nhắn em, chuyện khác đừng hỏi. Em quê. Mô phật</div>
            `;
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
